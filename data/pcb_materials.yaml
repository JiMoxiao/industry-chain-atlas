- id: pcb_specialty_resin
  name: 特种树脂(CCL基体)
  position: upstream
  tier: 1
  description: 树脂是CCL的基体粘接材料（占CCL成本~40-50%），将电子布与铜箔热压粘合成一体。普通FR-4用环氧树脂（Tg 130-140°C），高频高速CCL需要BT树脂（双马来酰亚胺三嗪）、PPE（聚苯醚）、PTFE（聚四氟乙烯）、碳氢树脂（Hydrocarbon）。AI服务器PCB（M6/M7/M8等级）用的超低损耗树脂全球95%+被松下电工（Megtron系列）、AGC（日本旭硝子）、Rogers（美国）垄断。东材科技是国内唯一实现PPE树脂量产的企业，BT/PTFE树脂国产化近乎空白。
  key_companies:
  - code: '601208'
    name: 东材科技
    role: 国内唯一PPE树脂量产（高频CCL核心基体），BT树脂研发中，光学膜+电子树脂双平台
  - code: '002669'
    name: 康达新材
    role: 电子级环氧树脂/BT树脂复合材料，CCL用特种胶粘剂布局
