- id: pcb_copper_foil
  name: 电子铜箔
  position: upstream
  tier: 1
  description: 电子铜箔是CCL的导电层，经热压与电子布+树脂复合形成覆铜板。按工艺分电解铜箔（主流，占95%+）和压延铜箔（柔性板FPC用）。AI服务器PCB对铜箔要求极高——超低轮廓（Rz<1.5μm，减少高频信号趋肤效应损耗）、极薄（6-12μm）、高延伸率。全球高端电子铜箔被三井金属（日本）、古河电工（日本）、日矿金属（日本）垄断60%+，国产替代空间大。铜冠铜箔是国内电子铜箔龙头（全球第四），高频高速铜箔已进入华为/中兴供应链。
  key_companies:
  - code: '301217'
    name: 铜冠铜箔
    role: 国内电子铜箔龙头（全球第四），高频高速铜箔进入华为/中兴，锂电铜箔+电子铜箔双线
  - code: '600110'
    name: 诺德股份
    role: 铜箔龙头，锂电铜箔为主（占80%+），电子铜箔产能逐步扩大
  - code: '603799'
    name: 嘉元科技
    role: 锂电铜箔龙头，极薄电子铜箔（4.5-6μm）技术储备
