- id: pcb_ccl
  name: 覆铜板(CCL)
  position: upstream
  tier: 1
  description: 覆铜板(Copper Clad Laminate)是将电子布浸渍树脂后与铜箔热压而成的复合材料，是PCB的核心基板。CCL占PCB成本30-40%，其介电性能(Dk/Df)、热膨胀系数(CTE)、玻璃化转变温度(Tg)直接决定PCB性能等级。AI服务器用M6/M7/M8级CCL要求超低损耗(Df<0.002@10GHz)，全球90%+被松下电工(Megtron系列)、AGC、Rogers垄断。生益科技是国内唯一进入AI服务器供应链的CCL厂商（全球销量第二）。
  key_companies:
  - code: '600183'
    name: 生益科技
    role: 全球CCL销量第二，国内唯一进入AI服务器M7级CCL供应链，产品覆盖全系列
  - code: '688519'
    name: 南亚新材
    role: 高速CCL国内前三，M6级AI服务器CCL批量供货
  - code: '603186'
    name: 华正新材
    role: 高频CCL+铝基板，AI服务器CCL布局中
