- id: pcb_glass_yarn
  name: 电子级玻纤纱
  position: upstream
  tier: 1
  description: 电子级玻璃纤维纱是电子布的织造原料，由熔融玻璃液经铂金漏板高速拉丝而成。单丝直径4-9μm（头发丝的1/10），要求极低气泡率和高度均匀的介电性能。全球电子纱产能高度集中于中国（占70%+），中国巨石一家独大（全球电子纱产能~25%）。电子纱按介电常数分E-glass(普通)和Low-Dk glass(低介电)，后者是5G/AI服务器PCB的必需原料，技术壁垒极高，全球仅日本日东纺和中国巨石/泰山玻纤能稳定量产。
  key_companies:
  - code: '600176'
    name: 中国巨石
    role: 全球玻纤产能第一（~260万吨/年），电子纱产能国内最大，Low-Dk电子纱量产
