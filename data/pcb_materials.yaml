- id: pcb_glass_cloth
  name: 电子布(电子级玻纤布)
  position: upstream
  tier: 1
  description: 电子布由电子纱经整经→浆纱→织造→退浆→表面处理而成，是覆铜板(CCL)的核心骨架增强材料，占CCL成本~20-30%。高端电子布向超薄化（<28μm厚度）、低介电常数（Dk<4.0@10GHz）、低热膨胀（CTE<3ppm/°C）演进。宏和科技是全球超薄/极薄电子布市占率第一（2025年20.5%），也是国内唯二实现第二代Low Dk/Df布批量稳定供货的厂商。AI服务器PCB需用3-5层超薄低介电布叠加，单台AI服务器PCB用布量是传统服务器的3-5倍。
  key_companies:
  - code: '603256'
    name: 宏和科技
    role: 全球超薄/极薄电子布市占第一（20.5%），Low Dk/Df布国内唯二量产，石英纤维布全球首批量产
  - code: '600176'
    name: 中国巨石
    role: 从电子纱垂直整合至电子布，电子布产能国内前三
