  description: 高纯碳化硅粉体(6N-8N)是SiC衬底PVT长晶核心原料，直接决定衬底缺陷密度和良率。国内最大专业粉料商河南中宜创芯(8N8/500吨年/平煤神马系)未上市，天科合达(非上市)自产5N5粉料并对外销售。A股中三安光电/合盛硅业为垂直整合自供模式。高端半导体级粉料仍存差距。
