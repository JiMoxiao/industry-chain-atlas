- id: sm_quartz
  name: 石英坩埚与石英制品
  position: upstream
  tier: 1
  description: 石英坩埚是CZ单晶拉制核心消耗品(每炉一只/寿命~650h)，内层高纯合成石英砂(涂层)长期被日本三菱化学垄断。石英舟/管/环用于晶圆热处理和刻蚀腔体。半导体级32英寸+坩埚由日本信越石英主导，国产化率<30%。凯盛科技合成石英砂是国产替代关键变量。
