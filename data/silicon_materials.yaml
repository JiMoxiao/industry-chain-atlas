- id: sm_compound_substrate
  name: 化合物半导体衬底
  position: upstream
  tier: 1
  description: 砷化镓(GaAs)、磷化铟(InP)、氮化镓(GaN)衬底是第二代/第三代化合物半导体的"硅片"。GaAs衬底用于手机PA/射频开关（5G手机PA用量4-8颗）、光通信激光器；InP衬底用于光模块EML/DFB激光器、太赫兹器件；GaN-on-SiC衬底用于5G基站功放和卫星通信。全球GaAs衬底~$6亿市场被Freiberger(德国)、住友电工(日本)、AXT(美国/中国)三家垄断85%+。InP衬底90%+被住友电工垄断。国产GaAs/InP衬底在LED低端市场有量，通信级严重依赖进口。
  key_companies:
