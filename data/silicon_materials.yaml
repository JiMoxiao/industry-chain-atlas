- id: sm_soi_specialty
  name: SOI与特种硅片
  position: upstream
  tier: 1
  description: SOI(Silicon-On-Insulator，绝缘体上硅)由顶层硅(器件层)+埋氧层(BOX SiO₂)+衬底硅构成。RF-SOI用于5G手机射频前端开关/LNA（每部5G手机用6-10片RF-SOI），FD-SOI(全耗尽SOI)用于汽车MCU和IoT低功耗芯片（28nm FD-SOI可替代16nm FinFET能效）。全球SOI硅片市场99%被法国Soitec垄断（Smart Cut技术专利），沪硅产业旗下新傲科技是Soitec中国合作伙伴和唯一国产SOI硅片供应商。区熔(FZ)硅片是另一特种硅片，用于高压IGBT和晶闸管。
