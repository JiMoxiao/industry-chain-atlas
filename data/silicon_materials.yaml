- id: sm_epitaxial_wafer
  name: 外延片
  position: upstream
  tier: 1
  description: 外延片(Epitaxial Wafer)是在抛光硅片上生长一层高纯度单晶薄膜，是芯片制造的直接衬底材料。硅外延片用于功率器件(IGBT/MOSFET)、CIS图像传感器——外延层电阻率/厚度决定器件击穿电压。SiC外延片是SiC MOSFET/SBD的关键——外延层质量直接决定器件导通电阻和可靠性，SiC外延全球CR3(Wolfspeed/II-VI/Showa Denko)占80%+。GaN-on-SiC外延用于5G基站射频功放。外延是"硅片→芯片"之间最后一道材料工序。
  key_companies:
