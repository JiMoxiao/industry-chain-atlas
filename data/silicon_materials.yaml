  description: 电子级多晶硅(11N-13N纯度)是半导体CZ/FZ单晶生长的直接原料。全球仅德国Wacker、日本Tokuyama、美国Hemlock三家垄断12英寸晶圆用市场。中国光伏级多晶硅产能>200万吨全球主导，但12英寸用半导体级国产化率不足10%，是半导体材料"卡脖子"最核心环节。鑫华半导体(IPO中)是国内电子级专业龙头。
