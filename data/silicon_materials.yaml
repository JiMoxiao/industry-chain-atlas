- id: sm_wafer_consumables
  name: 硅片加工辅材(切割/研磨)
  position: upstream
  tier: 1
  description: 金刚线(电镀金刚石线锯)是硅片切割核心工具，线径从120μm微缩至<50μm。半导体级金刚线要求极高一致性（线径波动<±1μm）、低断线率、高切割速度。每片12英寸硅片消耗金刚线~2.5m。光伏金刚线国产化率>95%，但半导体级（线径<60μm、低损伤层）仍被日本则武/旭金刚石主导。切割冷却液、研磨液与金刚线配套使用，是硅片加工三大消耗品之一。
  key_companies:
  - code: '300554'
    name: 三超新材
    role: 金刚线（硅片切割用）龙头，半导体硅片切割线国内领先，金刚线线径<50μm
  - code: '300700'
    name: 岱勒新材
    role: 金刚石线（光伏→半导体延伸），半导体硅片切割线开发送样中
